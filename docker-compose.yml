version: '3.8'

services:
  carlog.vehicle.api:
    image: ${DOCKER_REGISTRY-}carlogvehicleapi
    build:
      context: .
      dockerfile: src/Services/Vehicle/CarLog.Vehicle.Api/Dockerfile
    container_name: carlog-vehicle-api
    ports:
      - "${VEHICLE_API_HTTP_PORT}:8080"
      - "${VEHICLE_API_HTTPS_PORT}:8081"
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}
      - ASPNETCORE_URLS=https://+:8081;http://+:8080
      - ASPNETCORE_Kestrel__Certificates__Default__Password=${CERT_PASSWORD}
      - ASPNETCORE_Kestrel__Certificates__Default__Path=/https/aspnetapp.pfx
      - ConnectionStrings__AzureSqlConnection=Server=sql-server-vehicle;Database=CarLogVehicleDb;User Id=sa;Password=${DB_PASSWORD};TrustServerCertificate=True
    volumes:
      - ~/.aspnet/https:/https:ro
    depends_on:
      - sql-server-vehicle
    networks:
      - carlog-network

  sql-server-vehicle:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: carlog-sql-server-vehicle
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${DB_PASSWORD}
      - MSSQL_PID=Express
    ports:
      - "${SQL_PORT_VEHICLE}:1433"
    volumes:
      - sql-data-vehicle:/var/opt/mssql
    networks:
      - carlog-network

  carlog.maintenance.api:
    image: ${DOCKER_REGISTRY-}carlogmaintenanceapi
    build:
      context: .
      dockerfile: src/Services/Maintenance/CarLog.Maintenance.Api/Dockerfile
    container_name: carlog-maintenance-api
