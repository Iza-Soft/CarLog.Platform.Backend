      - ASPNETCORE_Kestrel__Certificates__Default__Path=/https/aspnetapp.pfx
      - ConnectionStrings__AzureSqlConnection=Server=sql-server-reminder;Database=CarLogReminderDb;User Id=sa;Password=${DB_PASSWORD};TrustServerCertificate=True
    volumes:
      - ~/.aspnet/https:/https:ro
    depends_on:
      - sql-server-reminder
    networks:
      - carlog-network

  sql-server-reminder:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: carlog-sql-server-reminder
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${DB_PASSWORD}
      - MSSQL_PID=Express
    ports:
      - "${SQL_PORT_REMINDER}:1433"
    volumes:
