version: '3.8'

services:
  carlog.vehicle.api:
    image: ${DOCKER_REGISTRY-}carlogvehicleapi
    build:
      context: .
      dockerfile: src/Services/Vehicle/CarLog.Vehicle.Api/Dockerfile
    container_name: carlog-vehicle-api
    ports:
      - "${API_HTTP_PORT}:8080"
      - "${API_HTTPS_PORT}:8081"
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}
      - ASPNETCORE_URLS=https://+:8081;http://+:8080
      - ASPNETCORE_Kestrel__Certificates__Default__Password=${CERT_PASSWORD}
      - ASPNETCORE_Kestrel__Certificates__Default__Path=/https/aspnetapp.pfx
      - ConnectionStrings__DefaultConnection=Server=sql-server;Database=CarLog.VehicleDb;User Id=sa;Password=${DB_PASSWORD};TrustServerCertificate=True
    volumes:
      - ~/.aspnet/https:/https:ro
    depends_on:
      - sql-server
    networks:
      - carlog-network

  sql-server:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: carlog-sql-server
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${DB_PASSWORD}
      - MSSQL_PID=Express
    ports:
      - "${SQL_PORT}:1433"
    volumes:
      - sql-data:/var/opt/mssql
    networks:
      - carlog-network

volumes:
  sql-data:

networks:
  carlog-network:
    driver: bridge
